account_id = "2d61278ad8b69df60cde602758926e14"
name = "blog-stage"
main = "src/worker/unified.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# Observability
[observability]
enabled = true

[[rules]]
type = "Text"
globs = ["**/*.md"]
fallthrough = true

[assets]
directory = "./dist/frontend-start/client"
run_worker_first = ["/", "/posts", "/posts/*", "/index.md", "/posts.md", "/api/*", "/robots.txt", "/sitemap.xml", "/feed.xml", "/llms.txt", "/llms-full.txt", "/.well-known/*"]

[[routes]]
pattern = "blog-stage.krasnoperov.me"
custom_domain = true

[vars]
NODE_ENV = "stage"
ENVIRONMENT = "stage"

[env.production]
name = "blog-production"

[[env.production.routes]]
pattern = "blog.krasnoperov.me"
custom_domain = true

[[env.production.routes]]
pattern = "www.blog.krasnoperov.me"
custom_domain = true

[env.production.vars]
NODE_ENV = "production"
ENVIRONMENT = "production"

[dev]
port = 8788
local_protocol = "http"
