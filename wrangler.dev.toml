account_id = "2d61278ad8b69df60cde602758926e14"
name = "blog-local"
main = "src/worker/unified.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# Observability
[observability]
enabled = true

[[rules]]
type = "Text"
globs = ["**/*.md"]
fallthrough = true

[assets]
directory = "./dist/frontend-start/client"
run_worker_first = ["/", "/posts", "/posts/*", "/index.md", "/posts.md", "/api/*", "/robots.txt", "/sitemap.xml", "/feed.xml", "/llms.txt", "/llms-full.txt", "/.well-known/*"]

[vars]
NODE_ENV = "development"
ENVIRONMENT = "local"

[dev]
port = 8788
local_protocol = "http"
